# Left-column menu boxes (#E1E708 border). Order here = display order.
# type: skills | blog | projects
# source (projects only): collection:<name> | category:<Category Name>
# Optional per-window first-open position: default_left/default_top, e.g. "208px" or "12vw".
# Optional default_z sets the initial stacking order. default_open: true shows a window on page load.
- label: "Skills"
  id: "win-skills"
  filename: "skills.txt"
  type: "skills"
  default_left: "195.729px"
  default_top: "140.729px"
  default_z: 14
