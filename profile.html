---
layout: profile
title: Profile
permalink: /profile/
---

<main class="desktop" data-desktop>
  <!-- Left column: intro card + menu boxes -->
  <div class="desktop__left">
    <div class="desktop__intro">
      <img class="desktop__intro-img" src="{{ site.baseurl }}{{ site.data.profile.intro.image }}" alt="{{ site.data.profile.intro.heading }}" loading="lazy">
    </div>

    <nav class="desktop__menu" aria-label="Profile sections">
      {% for item in site.data.profile.menu %}
        <button type="button" class="desktop__menu-item" data-mac-open="{{ item.id }}">
          {{ item.label }}
        </button>
      {% endfor %}
    </nav>
  </div>

  <!-- Center/right: stylized image -->
  <button
    type="button"
    class="desktop__art"
    data-profile-art-toggle
    data-light-src="{{ site.baseurl }}/public/metal-yein-2.png"
    data-dark-src="{{ site.baseurl }}/public/ttori.png"
    aria-pressed="false"
    aria-label="Toggle profile dark mode"
  >
    <img src="{{ site.baseurl }}/public/metal-yein-2.png" alt="YEIN" loading="lazy">
  </button>

  <!-- Window layer (all windows pre-rendered, hidden until opened) -->
  <div class="desktop__windows" data-mac-layer>
    {% for item in site.data.profile.menu %}
      {% include profile/window.html item=item %}
    {% endfor %}
  </div>
</main>
