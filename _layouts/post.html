---
layout: default
---

<div class="post post-lab-sheet">
  <div class="post-cell post-cell--label">Title</div>
  <div class="post-cell post-cell--value">
    <h1 class="post-title">{{ page.title | strip_html }}</h1>
  </div>

  {% if page.tags %}
  <div class="post-cell post-cell--label">Tag</div>
  <div class="post-cell post-cell--value">
    {% for tag in page.tags %}
      <a href="{{ site.baseurl }}{{ site.tag_page }}#{{ tag | slugify }}" class="post-tag">{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}

  <div class="post-cell post-cell--label">Date</div>
  <div class="post-cell post-cell--value">
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date_to_string }}</time>
  </div>

  <div class="post-cell post-cell--label post-cell--toc">
    <div class="post-rail__sticky">
      <nav class="post-toc" aria-label="Post table of contents"></nav>
    </div>
  </div>
  <div class="post-cell post-cell--value post-content"><article>
    {{ content }}
  </article></div>
  <!-- <br><br>
  <a href="https://ratsgo.github.io/natural%20language%20processing/2019/09/12/embedding/">
    <picture>
      <source media="(max-width: 400px)" srcset="https://i.imgur.com/NrwbbXx.jpg">
      <img src="https://i.imgur.com/GTbfcSt.jpg">
    </picture>
  </a>-->
</div>

<script>
  (function() {
    var toc = document.getElementById('markdown-toc');
    var tocTarget = document.querySelector('.post-toc');

    if (!tocTarget) return;

    if (toc) {
      tocTarget.appendChild(toc);
    } else {
      tocTarget.setAttribute('hidden', 'hidden');
    }
  })();
</script>
